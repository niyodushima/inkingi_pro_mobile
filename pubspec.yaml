name: inkingi_pro_mobile
description: "Inkingi Pro - Connect engineers, investors, supervisors, and suppliers in construction projects."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.1

dependencies:
  flutter:
    sdk: flutter

  # Icons
  cupertino_icons: ^1.0.8

  # Fonts and styling
  google_fonts: ^6.1.0

  # State management (optional, but useful as app grows)
  provider: ^6.1.2

  # For image handling (logos, backgrounds, uploads)
  flutter_svg: ^2.0.9

  # For routing/navigation
  go_router: ^14.0.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/logoo.jpg
    - assets/images/bg.png
    # Add more images/icons here as needed

  fonts:
    - family: Poppins
      fonts:
        - asset: assets/fonts/Poppins-Regular.ttf
        - asset: assets/fonts/Poppins-Bold.ttf
          weight: 700
